# ============================================================
# EvidencePipeline Parameters Template (parameters.yaml)
# ============================================================
# Copy this file and edit paths according to your project.
# All fields are optional unless stated otherwise.
# ============================================================

# ------------------------------------------------------------
# Required input
# ------------------------------------------------------------
genome: /path/to/genome.fa   # REQUIRED

# ------------------------------------------------------------
# RNA-Seq short reads (FASTQ)
# ------------------------------------------------------------

rnaseq_bam: [
  # path to aligned short read RNA-Seq BAM files, e.g. from VARUS
]

# Single-end RNA-Seq reads (list of FASTQ files)
rnaseq_single: [
  # /path/to/sample1.fastq.gz,
  # /path/to/sample2.fastq.gz,
]

# Paired-end RNA-Seq reads. Use ONE of the three accepted forms:
#
# (a) Single glob string. Matches one or many libraries via fromFilePairs.
#     A LIST of globs is NOT supported - use one glob that covers all files.
rnaseq_paired: "/path/to/rnaseq/*_{1,2}.fastq.gz"
#
# (b) Explicit list of [r1, r2] pairs (one entry per library):
# rnaseq_paired:
#   - ["/abs/path/sample1_R1.fastq.gz", "/abs/path/sample1_R2.fastq.gz"]
#   - ["/abs/path/sample2_R1.fastq.gz", "/abs/path/sample2_R2.fastq.gz"]
#
# (c) Flat list of exactly two FASTQ files (a single library):
# rnaseq_paired:
#   - /abs/path/sample_R1.fastq.gz
#   - /abs/path/sample_R2.fastq.gz
#
# Note: '~' is not expanded; use absolute paths or paths relative to the
# directory where Nextflow is launched (not to this YAML file).

# ------------------------------------------------------------
# Iso-Seq long reads (FASTQ)
# ------------------------------------------------------------
isoseq: "/path/to/isoseq/*.fastq.gz"
# OR:
# isoseq: [
#   /path/to/isoseq1.fastq.gz,
#   /path/to/isoseq2.fastq.gz,
# ]

# ------------------------------------------------------------
# SRA download
# ------------------------------------------------------------

# Paired-end RNA-Seq SRA run IDs
rnaseq_sra_paired: [
  # SRRXXXXXX,
  # SRRYYYYYY,
]

# Single-end RNA-Seq SRA run IDs
rnaseq_sra_single: []

# Iso-Seq SRA run IDs
isoseq_sra: [
  # DRRXXXXX,
]

# ------------------------------------------------------------
# Protein evidence (FASTA)
# ------------------------------------------------------------
# Single file:
# proteins: /path/to/proteins.faa
# OR multiple files (will be concatenated):
proteins: [
#   /path/to/proteins1.faa,
#   /path/to/proteins2.faa,
]

# Optional ODB12 partitions (downloaded, extracted, then concatenated)
odb12Partitions: [
#   Metazoa,
#   Vertebrata,
]

# ------------------------------------------------------------
# General Settings
# ------------------------------------------------------------
threads: 32
outdir: results
restart: false

# ------------------------------------------------------------
# Tiberius Integration (optional)
# ------------------------------------------------------------
tiberius:
  run: true
  min_split_size: 5000000
  max_files: 20
  # name of the Tiberius configuration available at
  # https://github.com/Gaius-Augustus/Tiberius/tree/main/model_cfg
  # or path to a local configuration file
  model_cfg: model_cfg.yaml
