comment: |
          Training by Mario Stanke, Nov 10th 2025.
          Benchmarking by Mario Stanke and Lars Gabriel.
          This model was trained on vertebrates including fish, birds, lizards,
          and mammals. It should be preferred on non-mammalian vertebrate genomes
          over the mammalian model.
          (gffcompare v0.12.10) on 6 non-mammalian vertebrate test species.
          - None of the species were used during Tiberius and ANNEVO training
          - Archocentrus centrarchus, Betta splendens, Gallus gallus, Pristiophorus japonicus and Takifugu rubripes
                 were used during training or validation of Helixer
